<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Municipios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --ink: #1a1a1a;
      --muted: #7a7a7a;
      --border: #e2e2e2;
      --accent: #2d5a3d;
      --accent-light: #e8f0eb;
      --shadow: 0 2px 20px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
    }

    /* ── Hero ── */
    .hero {
      width: 100%;
      max-width: 720px;
      text-align: center;
      padding: 80px 0 48px;
      transition: padding 0.4s ease;
    }
    .hero.has-results { padding: 40px 0 32px; }

    .site-title {
      font-family: 'Crimson Pro', serif;
      font-weight: 300;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: -0.5px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
    }

    /* ── Search ── */
    .search-wrap { position: relative; width: 100%; }

    .search-input {
      width: 100%;
      padding: 16px 56px 16px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--ink);
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }
    .search-input::placeholder { color: #b0b0b0; }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-light), var(--shadow);
    }

    .search-btn {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .search-btn:hover { background: #1e3d2a; transform: translateY(-50%) scale(1.06); }
    .search-btn svg {
      width: 18px; height: 18px;
      stroke: #fff; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Suggestions ── */
    .suggestions {
      position: absolute;
      top: calc(100% + 6px); left: 0; right: 0;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden; z-index: 100; display: none;
    }
    .suggestions.visible { display: block; }
    .suggestion-item {
      padding: 12px 22px; font-size: 14px; cursor: pointer;
      color: var(--ink); border-bottom: 1px solid #f0f0f0;
      text-align: left; transition: background 0.15s;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--accent-light); }
    .suggestion-item strong { color: var(--accent); font-weight: 500; }

    .hint { margin-top: 10px; font-size: 12px; color: #c0c0c0; text-align: center; }

    /* ── Results area ── */
    .results-area {
      width: 100%;
      max-width: 720px;
      padding-bottom: 60px;
    }

    /* ── Municipio header ── */
    .municipio-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeUp 0.3s ease both;
    }
    .municipio-header h2 {
      font-family: 'Crimson Pro', serif;
      font-weight: 400;
      font-size: 30px;
      letter-spacing: -0.3px;
    }
    .municipio-count {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Grid de encomendistas ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Tarjeta individual ── */
    .enc-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeUp 0.35s ease both;
      display: flex;
      flex-direction: column;
    }

    .enc-card:nth-child(2) { animation-delay: 0.05s; }
    .enc-card:nth-child(3) { animation-delay: 0.10s; }
    .enc-card:nth-child(4) { animation-delay: 0.15s; }
    .enc-card:nth-child(n+5) { animation-delay: 0.18s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .enc-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .enc-meta {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
    }

    .enc-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Botón compartir ── */
    .messenger-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 9px 14px;
      background: #0099ff;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .messenger-btn:hover { background: #0077cc; transform: scale(1.03); }
    .messenger-btn:disabled { background: #80c8ff; cursor: wait; }
    .messenger-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Sin resultados ── */
    .no-result {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 15px;
      animation: fadeUp 0.3s ease both;
    }
    .no-result span {
      display: block;
      font-family: 'Crimson Pro', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--ink);
      margin-bottom: 6px;
    }

    @media (max-width: 500px) {
      .hero { padding: 56px 0 36px; }
      .site-title { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="hero" id="hero">
    <h1 class="site-title">Municipios</h1>
    <p class="subtitle">Ingresa el nombre del municipio</p>

    <div class="search-wrap">
      <input
        type="text"
        id="search"
        class="search-input"
        placeholder="Ej: Acajutla, Santa Ana…"
        autocomplete="off"
        aria-label="Buscar municipio"
      />
      <button class="search-btn" id="btn" aria-label="Buscar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
      <div class="suggestions" id="suggestions"></div>
    </div>
    <p class="hint">Presiona Enter o toca la lupa para buscar</p>
  </div>

  <div class="results-area" id="results"></div>

  <script>
    let municipios = [];

    async function loadData() {
      try {
        const res = await fetch('data.json');
        municipios = await res.json();
      } catch (e) {
        console.warn('No se encontró data.json. Usando datos de demo.');
        municipios = DEMO_DATA;
      }
    }

    /* ─── UI refs ─── */
    const searchInput   = document.getElementById('search');
    const suggestionsBox = document.getElementById('suggestions');
    const resultsArea   = document.getElementById('results');
    const hero          = document.getElementById('hero');

    function normalize(str) {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    /* ─── Icono Messenger ─── */
    const MESSENGER_ICON = `<svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.955 1.42 5.59 3.641 7.337V22l3.33-1.83c.89.247 1.833.38 2.029.38 5.523 0 10-4.144 10-9.307C21 6.145 17.523 2 12 2zm1.007 12.533l-2.548-2.718-4.972 2.718 5.476-5.813 2.61 2.718 4.91-2.718-5.476 5.813z"/>
    </svg>`;

    /* ─── Render resultado ─── */
    function search(query) {
      if (!query.trim()) { resultsArea.innerHTML = ''; return; }
      const q = normalize(query.trim());
      const match = municipios.find(m => normalize(m.municipio) === q) ||
                    municipios.find(m => normalize(m.municipio).includes(q));

      hero.classList.add('has-results');
      suggestionsBox.classList.remove('visible');
      suggestionsBox.innerHTML = '';

      if (!match) {
        resultsArea.innerHTML = `
          <div class="no-result">
            <span>Sin resultados</span>
            No se encontró "<em>${query}</em>" — revisa la ortografía.
          </div>`;
        return;
      }

      const enc = match.encomendistas || [];
      const count = enc.length;
      const label = count === 1 ? '1 encomendista' : `${count} encomendistas`;

      const cards = enc.map((e, i) => {
        const imageUrl = new URL(e.imagen, window.location.href).href;
        const safeName = e.nombre.replace(/'/g, "\\'");
        return `
          <div class="enc-card">
            <img src="${e.imagen}" alt="${e.nombre}" loading="lazy"
                 onerror="this.src='https://placehold.co/400x400/e8f0eb/2d5a3d?text=${encodeURIComponent(e.nombre)}'"/>
            <div class="enc-meta">
              <div class="enc-name">${e.nombre}</div>
              <button class="messenger-btn" onclick="shareImage('${imageUrl}', '${safeName}', this)">
                ${MESSENGER_ICON}
                Enviar
              </button>
            </div>
          </div>`;
      }).join('');

      resultsArea.innerHTML = `
        <div class="municipio-header">
          <h2>${match.municipio}</h2>
          <span class="municipio-count">${label}</span>
        </div>
        <div class="grid">${cards}</div>`;
    }

    /* ─── Compartir imagen real ─── */
    async function shareImage(imageUrl, nombre, btn) {
      try {
        btn.disabled = true;
        btn.innerHTML = `${MESSENGER_ICON} Cargando…`;

        const response = await fetch(imageUrl);
        const blob = await response.blob();
        const ext = blob.type.includes('png') ? 'png' : 'jpg';
        const file = new File([blob], `${nombre}.${ext}`, { type: blob.type });

        btn.innerHTML = `${MESSENGER_ICON} Enviar`;
        btn.disabled = false;

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: nombre });
        } else {
          await navigator.share({ url: imageUrl, title: nombre });
        }
      } catch (err) {
        btn.innerHTML = `${MESSENGER_ICON} Enviar`;
        btn.disabled = false;
      }
    }

    /* ─── Sugerencias ─── */
    searchInput.addEventListener('input', () => {
      const q = normalize(searchInput.value.trim());
      if (q.length < 2) { suggestionsBox.classList.remove('visible'); return; }

      const matches = municipios.filter(m => normalize(m.municipio).includes(q)).slice(0, 6);
      if (!matches.length) { suggestionsBox.classList.remove('visible'); return; }

      suggestionsBox.innerHTML = matches.map(m => {
        const highlighted = m.municipio.replace(
          new RegExp(`(${searchInput.value.trim()})`, 'gi'), '<strong>$1</strong>'
        );
        return `<div class="suggestion-item" data-name="${m.municipio}">${highlighted}</div>`;
      }).join('');

      suggestionsBox.classList.add('visible');
    });

    suggestionsBox.addEventListener('click', e => {
      const item = e.target.closest('.suggestion-item');
      if (!item) return;
      searchInput.value = item.dataset.name;
      search(item.dataset.name);
    });

    document.getElementById('btn').addEventListener('click', () => search(searchInput.value));
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(searchInput.value); });
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) suggestionsBox.classList.remove('visible');
    });

    loadData();
  </script>
</body>
</html>
